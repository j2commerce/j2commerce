; Plugin Description
PLG_J2COMMERCE_APP_LOCALIZATION_DATA="برنامه داده‌های بومی‌سازی J2Commerce"
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_DESCRIPTION="داده‌های بومی‌سازی (کشورها، مناطق، طول‌ها، وزن‌ها) را از فایل‌های نصب پیش‌فرض J2Commerce بازنشانی و دوباره نصب می‌کند. اگر داده‌های بومی‌سازی شما خراب شده است یا اگر نیاز به بازیابی مقادیر پیش‌فرض دارید، از این ابزار استفاده کنید."
