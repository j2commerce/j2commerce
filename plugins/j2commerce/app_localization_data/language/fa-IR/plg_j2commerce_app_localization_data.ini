; Help Text
PLG_J2COMMERCE_APP_LOCALIZATION_DATA_HELP_TEXT="هشدار: این ابزار جدول انتخاب شده را به طور کامل پاک کرده و داده‌های پیش‌فرض را از فایل‌های نصب J2Commerce دوباره نصب می‌کند. هرگونه ورودی یا تغییرات سفارشی که انجام داده‌اید برای همیشه از بین خواهد رفت. با احتیاط استفاده کنید و قبل از ادامه، از پایگاه داده خود پشتیبان بگیرید."

