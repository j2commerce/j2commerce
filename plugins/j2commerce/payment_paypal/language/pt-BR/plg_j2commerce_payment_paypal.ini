; Sandbox subscription test harness
PLG_J2COMMERCE_PAYMENT_PAYPAL_SANDBOX_TEST_LABEL="Teste de assinatura no sandbox"
PLG_J2COMMERCE_PAYMENT_PAYPAL_SANDBOX_TEST_DESC="<strong>1. Testar credenciais</strong> — verifica se client_id + secret do sandbox obtêm um token OAuth válido.<br><strong>2. Criar assinatura</strong> — cria um produto real de catálogo, plano de cobrança (US$ 1,00/dia × 5 ciclos) e assinatura no sandbox. Retorna uma URL de aprovação; clique nela, entre com uma conta PESSOAL sandbox e aprove.<br><strong>3. Verificar status</strong> — cole o ID da assinatura I-XXXX e confirme se remote_status mudou para ACTIVE após a aprovação.<br><strong>4. Cancelar</strong> — remove a assinatura de teste para que ela não continue cobrando a conta sandbox."
PLG_J2COMMERCE_PAYMENT_PAYPAL_SANDBOX_TEST_CREDS="1. Testar credenciais"
PLG_J2COMMERCE_PAYMENT_PAYPAL_SANDBOX_TEST_CREATE="2. Criar assinatura de teste"
PLG_J2COMMERCE_PAYMENT_PAYPAL_SANDBOX_TEST_CHECK="3. Verificar status"
PLG_J2COMMERCE_PAYMENT_PAYPAL_SANDBOX_TEST_CANCEL="4. Cancelar assinatura de teste"
PLG_J2COMMERCE_PAYMENT_PAYPAL_SANDBOX_TEST_NVP="5. Testar credenciais NVP"
