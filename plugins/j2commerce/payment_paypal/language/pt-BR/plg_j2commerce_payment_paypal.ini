; Configuration - Subscription mode toggle
PLG_J2COMMERCE_PAYMENT_PAYPAL_SUBSCRIPTION_MODE_LABEL="Modo de criação de assinaturas"
PLG_J2COMMERCE_PAYMENT_PAYPAL_SUBSCRIPTION_MODE_DESC="<strong>Controla como NOVAS assinaturas são criadas no checkout.</strong> As renovações sempre são direcionadas pela metakey, então assinaturas criadas em qualquer modo continuam funcionando quando esta opção é alterada.<br><br><strong>REST moderno</strong> (padrão): o cliente usa o popup dos Smart Buttons → agenda recorrente no PayPal → o cron do app cobra via /v1/billing/subscriptions/{id}/capture. Armazenado como metakey paypal_subscription_id.<br><br><strong>NVP legado</strong> (compatível com J2Store): o cliente é redirecionado para o PayPal Express Checkout clássico → BAID retornado → o cron do app cobra via DoReferenceTransaction. Armazenado como metakey billing_agreement_id. Use isto ao migrar do J2Store com a intenção de converter posteriormente BAIDs legados para valores modernos paypal_subscription_id."
PLG_J2COMMERCE_PAYMENT_PAYPAL_SUBSCRIPTION_MODE_REST="REST moderno / API de assinaturas (Smart Buttons)"
PLG_J2COMMERCE_PAYMENT_PAYPAL_SUBSCRIPTION_MODE_NVP="NVP legado / Express Checkout (compatível com J2Store)"

; Configuration - NVP credentials (legacy J2Store BAID renewals)
PLG_J2COMMERCE_PAYMENT_PAYPAL_NVP_SECTION_LABEL="Credenciais da API NVP (apenas renovações legadas)"
PLG_J2COMMERCE_PAYMENT_PAYPAL_NVP_SECTION_DESC="<strong>Necessário SOMENTE quando existirem assinaturas migradas do J2Store (linhas em #__j2commerce_metafields com metakey=billing_agreement_id).</strong> O PayPal parou de emitir credenciais NVP para novos lojistas em 2023. Se você é um novo lojista, deixe estes campos em branco; assinaturas criadas daqui para frente usam o fluxo REST moderno. Lojistas existentes do J2Store: localize api_username, api_password e api_signature no PayPal → Configurações da conta → Acesso à conta → Acesso à API → Integração de API NVP/SOAP → Gerenciar credenciais de API."
PLG_J2COMMERCE_PAYMENT_PAYPAL_NVP_API_USERNAME="Usuário da API NVP (produção)"
PLG_J2COMMERCE_PAYMENT_PAYPAL_NVP_API_USERNAME_DESC="api_username NVP de produção em Gerenciar credenciais de API do PayPal."
