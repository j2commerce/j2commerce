PLG_SCHEMAORG_ECOMMERCE="Schema.org - Ökologischer Handel"
PLG_SCHEMAORG_ECOMMERCE_XML_DESCRIPTION="Dieses Plugin fügt Unterstützung für strukturierte Daten für Ecommerce (Produkte) mit schema.org Markup hinzu. Es ist mit J2Commerce integriert, um automatisch Rich Snippets für Produkte, Preise und Verfügbarkeit zu erzeugen."

; Tab Labels
PLG_SCHEMAORG_ECOMMERCE_TAB_EXISTING="Vorhandene Produktdaten"
PLG_SCHEMAORG_ECOMMERCE_TAB_EXISTING_DESC="Automatisch ermittelte Produktdaten aus J2Commerce. Diese Daten werden verwendet, sofern sie nicht überschrieben werden."
PLG_SCHEMAORG_ECOMMERCE_TAB_OVERRIDE="Schema Überschreibungen"
PLG_SCHEMAORG_ECOMMERCE_TAB_OVERRIDE_DESC="Überschreiben Sie die automatisch erkannten Werte. Lassen Sie Felder leer, um erkannte Werte zu verwenden."

; Override Note
PLG_SCHEMAORG_ECOMMERCE_OVERRIDE_NOTE="Lassen Sie die Felder leer, um die automatisch erkannten Werte von J2Commerce zu verwenden. Alle Werte, die Sie hier eingeben, setzen die erkannten Daten im generierten Schema außer Kraft."

; Description note (legacy)
PLG_SCHEMAORG_ECOMMERCE_DESCRIPTION_LABEL="Wählen Sie 'Ecommerce' als Schematyp, um strukturierte Produktdaten zu generieren. Wenn dieser Artikel mit einem J2Commerce-Produkt verknüpft ist, werden die Produktdaten automatisch erkannt und mit den von Ihnen unten angegebenen Überschreibungen zusammengeführt."

; Basic Settings
PLG_SCHEMAORG_ECOMMERCE_FIELD_AUTO_DETECT_LABEL="Auto-Erkennung aktivieren"
PLG_SCHEMAORG_ECOMMERCE_FIELD_AUTO_DETECT_DESC="J2Commerce-Produktdaten automatisch erkennen und mit der Schemaausgabe zusammenführen."
PLG_SCHEMAORG_ECOMMERCE_FIELD_CURRENCY_LABEL="Shop-Währung"
PLG_SCHEMAORG_ECOMMERCE_FIELD_CURRENCY_DESC="Der in J2Commerce konfigurierte Währungscode (config_currency). Dieser ist schreibgeschützt und spiegelt Ihre J2Commerce Shop-Einstellungen wider."
PLG_SCHEMAORG_ECOMMERCE_JCOMMERCE_NOT_CONFIGURED="J2Commerce ist nicht installiert oder nicht konfiguriert. Bitte konfigurieren Sie J2Commerce, um die Währung Ihres Shops einzustellen."
PLG_SCHEMAORG_ECOMMERCE_FIELD_BRAND_LABEL="Standard Marke"
PLG_SCHEMAORG_ECOMMERCE_FIELD_BRAND_DESC="Standard-Markenname, der verwendet wird, wenn in den Produktdaten keine Marke erkannt wird."
