PLG_SCHEMAORG_ECOMMERCE="Schema.org - Ηλεκτρονικό εμπόριο"
PLG_SCHEMAORG_ECOMMERCE_XML_DESCRIPTION="Αυτό το πρόσθετο προσθέτει υποστήριξη δομημένων δεδομένων Ecommerce (Product) με χρήση schema.org markup. Ενσωματώνεται με το J2Commerce για την αυτόματη δημιουργία rich snippets για προϊόντα, τιμές και διαθεσιμότητα."

; Tab Labels
PLG_SCHEMAORG_ECOMMERCE_TAB_EXISTING="Υπάρχοντα δεδομένα προϊόντων"
PLG_SCHEMAORG_ECOMMERCE_TAB_EXISTING_DESC="Αυτόματη ανίχνευση πληροφοριών προϊόντος από το J2Commerce. Αυτά τα δεδομένα θα χρησιμοποιηθούν εκτός αν παρακαμφθούν."
PLG_SCHEMAORG_ECOMMERCE_TAB_OVERRIDE="Παράκαμψη σχήματος"
PLG_SCHEMAORG_ECOMMERCE_TAB_OVERRIDE_DESC="Παράκαμψη των τιμών που ανιχνεύονται αυτόματα. Αφήστε τα πεδία κενά για να χρησιμοποιήσετε τις ανιχνευμένες τιμές."

; Override Note
PLG_SCHEMAORG_ECOMMERCE_OVERRIDE_NOTE="Αφήστε τα πεδία κενά για να χρησιμοποιήσετε τις τιμές που ανιχνεύονται αυτόματα από το J2Commerce. Οποιεσδήποτε τιμές εισάγετε εδώ θα παρακάμψουν τα δεδομένα που ανιχνεύονται στο παραγόμενο σχήμα."

; Description note (legacy)
PLG_SCHEMAORG_ECOMMERCE_DESCRIPTION_LABEL="Επιλέξτε 'Ecommerce' ως τύπο σχήματος για τη δημιουργία δομημένων δεδομένων προϊόντος. Εάν αυτό το άρθρο συνδέεται με ένα προϊόν J2Commerce, τα δεδομένα προϊόντος θα ανιχνευθούν αυτόματα και θα συγχωνευθούν με τυχόν παρακάμψεις που καθορίζετε παρακάτω."

