PLG_SCHEMAORG_ECOMMERCE="Schema.org - Comercio electrónico"
PLG_SCHEMAORG_ECOMMERCE_XML_DESCRIPTION="Este plugin añade soporte para datos estructurados de Ecommerce (Producto) utilizando el marcado schema.org. Se integra con J2Commerce para generar automáticamente fragmentos enriquecidos para productos, precios y disponibilidad."

; Tab Labels
PLG_SCHEMAORG_ECOMMERCE_TAB_EXISTING="Datos de productos existentes"
PLG_SCHEMAORG_ECOMMERCE_TAB_EXISTING_DESC="Información de producto autodetectada desde J2Commerce. Estos datos se utilizarán a menos que se anulen."
PLG_SCHEMAORG_ECOMMERCE_TAB_OVERRIDE="Anulación del esquema"
PLG_SCHEMAORG_ECOMMERCE_TAB_OVERRIDE_DESC="Anula los valores autodetectados. Deje los campos vacíos para utilizar los valores detectados."

; Override Note
PLG_SCHEMAORG_ECOMMERCE_OVERRIDE_NOTE="Deje los campos vacíos para utilizar los valores autodetectados de J2Commerce. Cualquier valor que introduzca aquí anulará los datos detectados en el esquema generado."

; Description note (legacy)
PLG_SCHEMAORG_ECOMMERCE_DESCRIPTION_LABEL="Seleccione 'Ecommerce' como tipo de esquema para generar los datos estructurados de Producto. Si este artículo está vinculado a un producto J2Commerce, los datos del producto se detectarán automáticamente y se fusionarán con cualquier anulación que especifique a continuación."

