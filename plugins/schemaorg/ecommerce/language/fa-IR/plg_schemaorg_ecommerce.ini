PLG_SCHEMAORG_ECOMMERCE="Schema.org - تجارت الکترونیک"
PLG_SCHEMAORG_ECOMMERCE_XML_DESCRIPTION="این پلاگین پشتیبانی از داده‌های ساختار یافته Ecommerce (محصول) را با استفاده از نشانه‌گذاری schema.org اضافه می‌کند. با J2Commerce یکپارچه می‌شود تا به طور خودکار قطعه‌های غنی برای محصولات، قیمت‌گذاری و موجودی تولید کند."

; Tab Labels
PLG_SCHEMAORG_ECOMMERCE_TAB_EXISTING="داده‌های موجود محصول"
PLG_SCHEMAORG_ECOMMERCE_TAB_EXISTING_DESC="اطلاعات محصول به‌طور خودکار از J2Commerce شناسایی شده است. در صورت عدم لغو، از این داده‌ها استفاده می‌شود."
PLG_SCHEMAORG_ECOMMERCE_TAB_OVERRIDE="لغو تنظیمات Schema"
PLG_SCHEMAORG_ECOMMERCE_TAB_OVERRIDE_DESC="مقادیر شناسایی شده خودکار را لغو کنید. برای استفاده از مقادیر شناسایی شده، فیلدها را خالی بگذارید."

; Override Note
PLG_SCHEMAORG_ECOMMERCE_OVERRIDE_NOTE="برای استفاده از مقادیر شناسایی شده خودکار از J2Commerce، فیلدها را خالی بگذارید. هر مقداری که در اینجا وارد کنید، داده‌های شناسایی شده را در schema تولید شده لغو می‌کند."

; Description note (legacy)
PLG_SCHEMAORG_ECOMMERCE_DESCRIPTION_LABEL="برای تولید داده‌های ساختار یافته محصول، 'تجارت الکترونیک' را به عنوان نوع schema انتخاب کنید. اگر این مقاله به یک محصول J2Commerce متصل است، داده‌های محصول به‌طور خودکار شناسایی شده و با هر گونه لغو تنظیماتی که در زیر مشخص می‌کنید، ادغام می‌شوند."

