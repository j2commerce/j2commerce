PLG_SCHEMAORG_ECOMMERCE="Schema.org - Ecommerce"
PLG_SCHEMAORG_ECOMMERCE_XML_DESCRIPTION="Ta wtyczka dodaje obsługę danych strukturalnych Ecommerce (produkt) przy użyciu znaczników schema.org. Integruje się z J2Commerce, aby automatycznie generować fragmenty rozszerzone dla produktów, cen i dostępności."

