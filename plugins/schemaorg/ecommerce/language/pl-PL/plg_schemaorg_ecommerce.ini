PLG_SCHEMAORG_ECOMMERCE_TAB_OVERRIDE="Zastępowanie schematu"
PLG_SCHEMAORG_ECOMMERCE_TAB_OVERRIDE_DESC="Zastąpienie automatycznie wykrytych wartości. Proszę pozostawić puste pola, aby użyć wykrytych wartości."

; Override Note
PLG_SCHEMAORG_ECOMMERCE_OVERRIDE_NOTE="Proszę pozostawić pola puste, aby użyć automatycznie wykrytych wartości z J2Commerce. Wszelkie wprowadzone tutaj wartości zastąpią wykryte dane w wygenerowanym schemacie."

; Description note (legacy)
PLG_SCHEMAORG_ECOMMERCE_DESCRIPTION_LABEL="Proszę wybrać 'Ecommerce' jako typ schematu, aby wygenerować dane strukturalne produktu. Jeśli ten artykuł jest powiązany z produktem J2Commerce, dane produktu zostaną automatycznie wykryte i scalone z wszelkimi nadpisaniami określonymi poniżej."

