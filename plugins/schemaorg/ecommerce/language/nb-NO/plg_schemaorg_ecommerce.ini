PLG_SCHEMAORG_ECOMMERCE="Schema.org - E-handel"
PLG_SCHEMAORG_ECOMMERCE_XML_DESCRIPTION="Denne plugin-modulen legger til støtte for strukturerte data for e-handel (produkt) ved hjelp av schema.org-markering. Den integreres med J2Commerce for automatisk å generere rich snippets for produkter, priser og tilgjengelighet."

