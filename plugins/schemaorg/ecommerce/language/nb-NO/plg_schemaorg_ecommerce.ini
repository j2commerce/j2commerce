; Description note (legacy)
PLG_SCHEMAORG_ECOMMERCE_DESCRIPTION_LABEL="Velg 'E-handel' som skjematype for å generere strukturerte produktdata. Hvis denne artikkelen er knyttet til et J2Commerce-produkt, vil produktdata automatisk bli oppdaget og slått sammen med eventuelle overstyringer du angir nedenfor."

