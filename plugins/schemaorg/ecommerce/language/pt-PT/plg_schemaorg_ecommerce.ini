PLG_SCHEMAORG_ECOMMERCE="Schema.org - Comércio eletrónico"
PLG_SCHEMAORG_ECOMMERCE_XML_DESCRIPTION="Este plugin adiciona suporte a dados estruturados de Ecommerce (Produto) utilizando a marcação schema.org. Integra-se com o J2Commerce para gerar automaticamente rich snippets para produtos, preços e disponibilidade."

; Tab Labels
PLG_SCHEMAORG_ECOMMERCE_TAB_EXISTING="Dados de Produtos Existentes"
PLG_SCHEMAORG_ECOMMERCE_TAB_EXISTING_DESC="Informações de produto detectadas automaticamente do J2Commerce. Esses dados serão usados a menos que sejam substituídos."
PLG_SCHEMAORG_ECOMMERCE_TAB_OVERRIDE="Substituições de Esquema"
PLG_SCHEMAORG_ECOMMERCE_TAB_OVERRIDE_DESC="Substitua os valores auto-detectados. Deixe os campos vazios para utilizar valores detectados."

; Override Note
PLG_SCHEMAORG_ECOMMERCE_OVERRIDE_NOTE="Deixe os campos vazios para utilizar os valores auto-detectados do J2Commerce. Quaisquer valores que introduza aqui irão substituir os dados detectados no esquema gerado."

; Description note (legacy)
PLG_SCHEMAORG_ECOMMERCE_DESCRIPTION_LABEL="Selecione 'Ecommerce' como o tipo de esquema para gerar dados estruturados do Produto. Se este artigo estiver ligado a um produto J2Commerce, os dados do produto serão automaticamente detectados e fundidos com quaisquer substituições que especificar abaixo."

; Basic Settings
PLG_SCHEMAORG_ECOMMERCE_FIELD_AUTO_DETECT_LABEL="Ativar a deteção automática"
PLG_SCHEMAORG_ECOMMERCE_FIELD_AUTO_DETECT_DESC="Detecte automaticamente os dados do produto J2Commerce e combine-os com a saída do esquema."
PLG_SCHEMAORG_ECOMMERCE_FIELD_CURRENCY_LABEL="Moeda da Loja"
PLG_SCHEMAORG_ECOMMERCE_FIELD_CURRENCY_DESC="O código de moeda configurado no J2Commerce (config_currency). Isto é apenas de leitura e reflecte as suas definições de loja J2Commerce."
PLG_SCHEMAORG_ECOMMERCE_JCOMMERCE_NOT_CONFIGURED="O J2Commerce não está instalado ou não está configurado. Por favor, configure o J2Commerce para definir a moeda da sua loja."
PLG_SCHEMAORG_ECOMMERCE_FIELD_BRAND_LABEL="Marca predefinida"
PLG_SCHEMAORG_ECOMMERCE_FIELD_BRAND_DESC="Nome da marca predefinida a utilizar quando nenhuma marca é detectada a partir dos dados do produto."
PLG_SCHEMAORG_ECOMMERCE_FIELD_ORG_NAME_LABEL="Nome da Organização"
PLG_SCHEMAORG_ECOMMERCE_FIELD_ORG_NAME_DESC="Nome da organização de venda. Utilizado para a propriedade do vendedor no esquema de oferta."

