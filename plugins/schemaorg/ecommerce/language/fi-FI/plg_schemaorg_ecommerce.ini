PLG_SCHEMAORG_ECOMMERCE="Schema.org - Verkkokauppa"
PLG_SCHEMAORG_ECOMMERCE_XML_DESCRIPTION="Tämä lisäosa lisää verkkokaupan (tuote) strukturoitujen tietojen tuen käyttämällä schema.org-merkintää. Se integroituu J2Commercen kanssa luodakseen automaattisesti rikkaita snippettejä tuotteille, hinnoittelulle ja saatavuudelle."

; Tab Labels
PLG_SCHEMAORG_ECOMMERCE_TAB_EXISTING="Olemassa olevat tuotetiedot"
