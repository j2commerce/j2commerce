PLG_SCHEMAORG_ECOMMERCE_TAB_OVERRIDE="Skeeman ohitukset"
PLG_SCHEMAORG_ECOMMERCE_TAB_OVERRIDE_DESC="Ohita automaattisesti havaitut arvot. Jätä kentät tyhjiksi, jos haluat käyttää tunnistettuja arvoja."

; Override Note
PLG_SCHEMAORG_ECOMMERCE_OVERRIDE_NOTE="Jätä kentät tyhjiksi käyttääksesi J2Commercen automaattisesti havaitsemia arvoja. Kaikki tähän kenttään antamasi arvot ohittavat luodussa skeemassa havaitut tiedot."

; Description note (legacy)
