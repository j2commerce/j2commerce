PLG_SCHEMAORG_ECOMMERCE="Schema.org - Ecommerce"
PLG_SCHEMAORG_ECOMMERCE_XML_DESCRIPTION="Questo plugin aggiunge il supporto dei dati strutturati dell'Ecommerce (prodotti) utilizzando il markup Schema.org. Si integra con J2Commerce per generare automaticamente rich snippet per prodotti, prezzi e disponibilità."

; Tab Labels
PLG_SCHEMAORG_ECOMMERCE_TAB_EXISTING="Dati di prodotto esistenti"
PLG_SCHEMAORG_ECOMMERCE_TAB_EXISTING_DESC="Informazioni sui prodotti rilevate automaticamente da J2Commerce. Questi dati saranno utilizzati a meno che non vengano sovrascritti."
PLG_SCHEMAORG_ECOMMERCE_TAB_OVERRIDE="Sovrascrittura dello schema"
PLG_SCHEMAORG_ECOMMERCE_TAB_OVERRIDE_DESC="Sovrascrive i valori rilevati automaticamente. Lasciare i campi vuoti per utilizzare i valori rilevati."

; Override Note
PLG_SCHEMAORG_ECOMMERCE_OVERRIDE_NOTE="Lasci i campi vuoti per utilizzare i valori rilevati automaticamente da J2Commerce. Qualsiasi valore inserito in questo campo sostituirà i dati rilevati nello schema generato."

; Description note (legacy)
PLG_SCHEMAORG_ECOMMERCE_DESCRIPTION_LABEL="Selezioni 'Ecommerce' come tipo di schema per generare i dati strutturati del prodotto. Se questo articolo è collegato ad un prodotto J2Commerce, i dati del prodotto saranno rilevati automaticamente e uniti con le eventuali sovrascritture che lei specificherà di seguito."

; Basic Settings
PLG_SCHEMAORG_ECOMMERCE_FIELD_AUTO_DETECT_LABEL="Abilita il rilevamento automatico"
PLG_SCHEMAORG_ECOMMERCE_FIELD_AUTO_DETECT_DESC="Rileva automaticamente i dati del prodotto J2Commerce e li fonde con l'output dello schema."
PLG_SCHEMAORG_ECOMMERCE_FIELD_CURRENCY_LABEL="Valuta del negozio"
PLG_SCHEMAORG_ECOMMERCE_FIELD_CURRENCY_DESC="Il codice di valuta configurato in J2Commerce (config_currency). È di sola lettura e riflette le impostazioni del suo negozio J2Commerce."
PLG_SCHEMAORG_ECOMMERCE_JCOMMERCE_NOT_CONFIGURED="J2Commerce non è installato o non è configurato. Configuri J2Commerce per impostare la valuta del suo negozio."
PLG_SCHEMAORG_ECOMMERCE_FIELD_BRAND_LABEL="Marca predefinita"
PLG_SCHEMAORG_ECOMMERCE_FIELD_BRAND_DESC="Marchio predefinito da utilizzare quando non viene rilevato alcun marchio dai dati del prodotto."
PLG_SCHEMAORG_ECOMMERCE_FIELD_ORG_NAME_LABEL="Nome dell'organizzazione"
PLG_SCHEMAORG_ECOMMERCE_FIELD_ORG_NAME_DESC="Nome dell'organizzazione di vendita. Utilizzato per la proprietà venditore nello schema Offerta."

