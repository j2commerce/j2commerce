PLG_SCHEMAORG_ECOMMERCE="Schema.org - Commerce électronique"
PLG_SCHEMAORG_ECOMMERCE_XML_DESCRIPTION="Ce plugin ajoute le support des données structurées Ecommerce (Produit) en utilisant le balisage schema.org. Il s'intègre à J2Commerce pour générer automatiquement des snippets riches pour les produits, les prix et la disponibilité."

; Tab Labels
PLG_SCHEMAORG_ECOMMERCE_TAB_EXISTING="Données produit existantes"
PLG_SCHEMAORG_ECOMMERCE_TAB_EXISTING_DESC="Informations produit auto-détectées à partir de J2Commerce. Ces données seront utilisées à moins qu'elles ne soient remplacées."
PLG_SCHEMAORG_ECOMMERCE_TAB_OVERRIDE="Remplacements de schéma"
PLG_SCHEMAORG_ECOMMERCE_TAB_OVERRIDE_DESC="Remplacez les valeurs détectées automatiquement. Laissez les champs vides pour utiliser les valeurs détectées."

; Override Note
PLG_SCHEMAORG_ECOMMERCE_OVERRIDE_NOTE="Laissez les champs vides pour utiliser les valeurs détectées automatiquement par J2Commerce. Toutes les valeurs que vous saisissez ici remplaceront les données détectées dans le schéma généré."

; Description note (legacy)
PLG_SCHEMAORG_ECOMMERCE_DESCRIPTION_LABEL="Sélectionnez 'Ecommerce' comme type de schéma pour générer des données structurées sur les produits. Si cet article est lié à un produit J2Commerce, les données du produit seront automatiquement détectées et fusionnées avec toutes les valeurs que vous spécifiez ci-dessous."

; Basic Settings
PLG_SCHEMAORG_ECOMMERCE_FIELD_AUTO_DETECT_LABEL="Activer la détection automatique"
PLG_SCHEMAORG_ECOMMERCE_FIELD_AUTO_DETECT_DESC="Détecter automatiquement les données de produit J2Commerce et les fusionner avec les données de sortie du schéma."
PLG_SCHEMAORG_ECOMMERCE_FIELD_CURRENCY_LABEL="Devise de la boutique"
PLG_SCHEMAORG_ECOMMERCE_FIELD_CURRENCY_DESC="Le code de devise configuré dans J2Commerce (config_currency). Ce code est en lecture seule et reflète les paramètres de votre boutique J2Commerce."
PLG_SCHEMAORG_ECOMMERCE_JCOMMERCE_NOT_CONFIGURED="J2Commerce n'est pas installé ou n'est pas configuré. Veuillez configurer J2Commerce pour définir la devise de votre boutique."
PLG_SCHEMAORG_ECOMMERCE_FIELD_BRAND_LABEL="Marque par défaut"
PLG_SCHEMAORG_ECOMMERCE_FIELD_BRAND_DESC="Nom de la marque par défaut à utiliser lorsqu'aucune marque n'est détectée dans les données du produit."
PLG_SCHEMAORG_ECOMMERCE_FIELD_ORG_NAME_LABEL="Nom de l'organisation"
PLG_SCHEMAORG_ECOMMERCE_FIELD_ORG_NAME_DESC="Nom de l'organisation de vente. Utilisé pour la propriété du vendeur dans le schéma de l'offre."

