PLG_SCHEMAORG_ECOMMERCE="Schema.org - E-handel"
PLG_SCHEMAORG_ECOMMERCE_XML_DESCRIPTION="Detta plugin lägger till stöd för strukturerad data för e-handel (produkt) med schema.org-markering. Det integreras med J2Commerce för att automatiskt generera rich snippets för produkter, priser och tillgänglighet."

; Tab Labels
PLG_SCHEMAORG_ECOMMERCE_TAB_EXISTING="Befintliga produktdata"
PLG_SCHEMAORG_ECOMMERCE_TAB_EXISTING_DESC="Autodetekterad produktinformation från J2Commerce. Dessa data kommer att användas om de inte åsidosätts."
PLG_SCHEMAORG_ECOMMERCE_TAB_OVERRIDE="Schema åsidosätter"
PLG_SCHEMAORG_ECOMMERCE_TAB_OVERRIDE_DESC="Åsidosätt automatiskt detekterade värden. Lämna fält tomma för att använda detekterade värden."

; Override Note
PLG_SCHEMAORG_ECOMMERCE_OVERRIDE_NOTE="Lämna fälten tomma för att använda de automatiskt upptäckta värdena från J2Commerce. Alla värden som du anger här kommer att åsidosätta de upptäckta uppgifterna i det genererade schemat."

; Description note (legacy)
PLG_SCHEMAORG_ECOMMERCE_DESCRIPTION_LABEL="Välj 'Ecommerce' som schematyp för att generera strukturerade produktdata. Om den här artikeln är länkad till en J2Commerce-produkt kommer produktdata automatiskt att upptäckas och slås samman med eventuella åsidosättningar som du anger nedan."

