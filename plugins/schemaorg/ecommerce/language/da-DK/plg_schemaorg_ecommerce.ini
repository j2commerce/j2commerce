PLG_SCHEMAORG_ECOMMERCE="Schema.org - E-handel"
PLG_SCHEMAORG_ECOMMERCE_XML_DESCRIPTION="Dette plugin tilføjer understøttelse af strukturerede data for e-handel (produkt) ved hjælp af schema.org-markup. Det integreres med J2Commerce for automatisk at generere rich snippets for produkter, priser og tilgængelighed."

; Tab Labels
PLG_SCHEMAORG_ECOMMERCE_TAB_EXISTING="Eksisterende produktdata"
PLG_SCHEMAORG_ECOMMERCE_TAB_EXISTING_DESC="Automatisk registrerede produktoplysninger fra J2Commerce. Disse data vil blive brugt, medmindre de tilsidesættes."
PLG_SCHEMAORG_ECOMMERCE_TAB_OVERRIDE="Tilsidesættelse af skema"
PLG_SCHEMAORG_ECOMMERCE_TAB_OVERRIDE_DESC="Tilsidesæt automatisk registrerede værdier. Lad felterne være tomme for at bruge registrerede værdier."

; Override Note
PLG_SCHEMAORG_ECOMMERCE_OVERRIDE_NOTE="Lad felterne være tomme for at bruge de automatisk registrerede værdier fra J2Commerce. Alle værdier, du indtaster her, vil tilsidesætte de registrerede data i det genererede skema."

; Description note (legacy)
PLG_SCHEMAORG_ECOMMERCE_DESCRIPTION_LABEL="Vælg 'E-handel' som skematype for at generere produktstrukturerede data. Hvis denne artikel er knyttet til et J2Commerce-produkt, vil produktdata automatisk blive registreret og flettet sammen med eventuelle tilsidesættelser, du angiver nedenfor."

