PLG_SCHEMAORG_ECOMMERCE="Schema.org - E-commerce"
PLG_SCHEMAORG_ECOMMERCE_XML_DESCRIPTION="Deze plugin voegt Ecommerce (Product) gestructureerde gegevens ondersteuning toe met behulp van schema.org markup. Het integreert met J2Commerce om automatisch rich snippets te genereren voor producten, prijzen en beschikbaarheid."

; Tab Labels
PLG_SCHEMAORG_ECOMMERCE_TAB_EXISTING="Bestaande productgegevens"
PLG_SCHEMAORG_ECOMMERCE_TAB_EXISTING_DESC="Automatisch gedetecteerde productgegevens van J2Commerce. Deze gegevens worden gebruikt tenzij ze worden overschreven."
PLG_SCHEMAORG_ECOMMERCE_TAB_OVERRIDE="Schema overschrijvingen"
PLG_SCHEMAORG_ECOMMERCE_TAB_OVERRIDE_DESC="Negeer automatisch gedetecteerde waarden. Laat velden leeg om gedetecteerde waarden te gebruiken."

; Override Note
PLG_SCHEMAORG_ECOMMERCE_OVERRIDE_NOTE="Laat velden leeg om de automatisch gedetecteerde waarden van J2Commerce te gebruiken. Alle waarden die u hier invoert, overschrijven de gedetecteerde gegevens in het gegenereerde schema."

; Description note (legacy)
PLG_SCHEMAORG_ECOMMERCE_DESCRIPTION_LABEL="Selecteer 'E-commerce' als het schema-type om gestructureerde productgegevens te genereren. Als dit artikel gekoppeld is aan een J2Commerce product, worden productgegevens automatisch gedetecteerd en samengevoegd met eventuele overschrijvingen die u hieronder opgeeft."

