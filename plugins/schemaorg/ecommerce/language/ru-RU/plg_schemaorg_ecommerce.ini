PLG_SCHEMAORG_ECOMMERCE="Schema.org - Электронная коммерция"
PLG_SCHEMAORG_ECOMMERCE_XML_DESCRIPTION="Этот плагин добавляет поддержку структурированных данных Ecommerce (Product) с помощью разметки schema.org. Он интегрируется с J2Commerce для автоматической генерации богатых сниппетов для товаров, цен и наличия."

; Tab Labels
PLG_SCHEMAORG_ECOMMERCE_TAB_EXISTING="Существующие данные о продуктах"
PLG_SCHEMAORG_ECOMMERCE_TAB_EXISTING_DESC="Автоматически найденная информация о товарах из J2Commerce. Эти данные будут использоваться, если их не переопределить."
PLG_SCHEMAORG_ECOMMERCE_TAB_OVERRIDE="Переопределения схемы"
PLG_SCHEMAORG_ECOMMERCE_TAB_OVERRIDE_DESC="Отмените автоматически найденные значения. Оставьте поля пустыми, чтобы использовать обнаруженные значения."

; Override Note
PLG_SCHEMAORG_ECOMMERCE_OVERRIDE_NOTE="Оставьте поля пустыми, чтобы использовать автоматически определяемые значения из J2Commerce. Любые значения, которые Вы введете здесь, будут переопределять обнаруженные данные в сгенерированной схеме."

; Description note (legacy)
PLG_SCHEMAORG_ECOMMERCE_DESCRIPTION_LABEL="Выберите 'Ecommerce' в качестве типа схемы для генерации структурированных данных Product. Если эта статья связана с продуктом J2Commerce, данные о продукте будут автоматически обнаружены и объединены с любыми переопределениями, которые Вы укажете ниже."

; Basic Settings
PLG_SCHEMAORG_ECOMMERCE_FIELD_AUTO_DETECT_LABEL="Включить автоматическое обнаружение"
PLG_SCHEMAORG_ECOMMERCE_FIELD_AUTO_DETECT_DESC="Автоматически обнаружить данные о продукте J2Commerce и объединить их с выходной схемой."
PLG_SCHEMAORG_ECOMMERCE_FIELD_CURRENCY_LABEL="Валюта магазина"
PLG_SCHEMAORG_ECOMMERCE_FIELD_CURRENCY_DESC="Код валюты, настроенный в J2Commerce (config_currency). Это значение доступно только для чтения и отражает настройки Вашего магазина J2Commerce."
PLG_SCHEMAORG_ECOMMERCE_JCOMMERCE_NOT_CONFIGURED="J2Commerce не установлен или не настроен. Пожалуйста, настройте J2Commerce, чтобы установить валюту Вашего магазина."
PLG_SCHEMAORG_ECOMMERCE_FIELD_BRAND_LABEL="Бренд по умолчанию"
PLG_SCHEMAORG_ECOMMERCE_FIELD_BRAND_DESC="Название бренда по умолчанию, которое будет использоваться, если бренд не определен из данных о товаре."
