PLG_FINDER_J2COMMERCE_REDIRECT_TO_DESC="Επιλέξτε πού θα οδηγούν τα αποτελέσματα αναζήτησης: στη σελίδα προβολής προϊόντος J2Commerce ή στη σελίδα προβολής άρθρου."
