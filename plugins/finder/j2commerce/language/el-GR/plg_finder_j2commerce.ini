PLG_FINDER_J2COMMERCE_XML_DESCRIPTION="Ενημερώνει τους δείκτες των προϊόντων J2Commerce κάθε φορά που δημιουργείται, τροποποιείται ή διαγράφεται ένα προϊόν. ΣΗΜΕΙΩΣΗ: το πρόσθετο περιεχομένου J2Commerce πρέπει να είναι ενεργοποιημένο για την αυτόματη ευρετηρίαση."

