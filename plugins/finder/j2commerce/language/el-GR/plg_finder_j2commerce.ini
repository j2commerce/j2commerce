PLG_FINDER_J2COMMERCE_EXCLUDE_LINKED_ARTICLES_LABEL="Εξαίρεση συνδεδεμένων άρθρων από την αναζήτηση"
PLG_FINDER_J2COMMERCE_EXCLUDE_LINKED_ARTICLES_DESC="Όταν είναι ενεργοποιημένη, τα άρθρα που έχουν ένα σχετικό προϊόν J2Commerce θα εξαιρούνται από την ευρετηρίαση της Έξυπνης Αναζήτησης. Μόνο ο σύνδεσμος του προϊόντος J2Commerce θα εμφανίζεται στα αποτελέσματα αναζήτησης."

