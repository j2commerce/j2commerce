PLG_FINDER_J2COMMERCE="Recherche intelligente - J2Commerce"
PLG_FINDER_J2COMMERCE_XML_DESCRIPTION="Mise à jour des index des produits J2Commerce à chaque fois qu'un produit est créé, modifié ou supprimé. REMARQUE : le plugin de contenu J2Commerce doit être activé pour permettre l'indexation automatique."

; Configuration Fields
PLG_FINDER_J2COMMERCE_REDIRECT_TO_LABEL="Rediriger les résultats de recherche vers"
PLG_FINDER_J2COMMERCE_REDIRECT_TO_DESC="Choisissez la destination vers laquelle les résultats de recherche doivent renvoyer : la page de produit J2Commerce ou la page de l'article."
PLG_FINDER_J2COMMERCE_REDIRECT_PRODUCT="Fiche produit"
PLG_FINDER_J2COMMERCE_REDIRECT_ARTICLE="Fiche article"
PLG_FINDER_J2COMMERCE_MENUITEM_LABEL="Élément de menu par défaut"
PLG_FINDER_J2COMMERCE_MENUITEM_DESC="Sélectionnez l'élément de menu par défaut à utiliser pour les URL de produit lorsqu'aucun menu de produit spécifique n'est trouvé."
PLG_FINDER_J2COMMERCE_SELECT_OPTION="- Sélectionner -"
PLG_FINDER_J2COMMERCE_SHOW_PRODUCT_IMAGE_LABEL="Afficher l'image du produit"
PLG_FINDER_J2COMMERCE_SHOW_PRODUCT_IMAGE_DESC="Affiche les images des produits dans les résultats de la recherche intelligente. Utilise la plus petite version d'image disponible (miniature, vignette ou principale)."
PLG_FINDER_J2COMMERCE_EXCLUDE_LINKED_ARTICLES_LABEL="Exclure les articles liés de la recherche"
PLG_FINDER_J2COMMERCE_EXCLUDE_LINKED_ARTICLES_DESC="Lorsque cette option est activée, les articles associés à un produit J2Commerce seront exclus de l'indexation de la recherche intelligente. Seul le lien vers le produit J2Commerce apparaîtra dans les résultats de recherche."

