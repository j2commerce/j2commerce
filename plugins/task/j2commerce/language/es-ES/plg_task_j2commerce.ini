PLG_TASK_J2COMMERCE="Tarea - J2Commerce"
PLG_TASK_J2COMMERCE_XML_DESCRIPTION="Tareas de mantenimiento automatizadas para J2Commerce. Incluye limpieza de pedidos abandonados y otras rutinas programadas."

; Cleanup Queue Logs routine
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_DESC="Elimina los registros de ejecución de colas antiguas y los elementos de cola completados para mantener limpia la base de datos."
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_DRY_RUN="Ejecución en seco"
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_DRY_RUN_DESC="Previsualiza lo que se borrará sin borrarlo realmente."
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_OLDER_THAN_DAYS="Borrar registros más antiguos que (días)"
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_OLDER_THAN_DAYS_DESC="Las entradas de registro más antiguas que esto serán borradas."
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_PURGE_COMPLETED="Purgar elementos completados más antiguos que (días)"
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_PURGE_COMPLETED_DESC="Se eliminarán los elementos de cola completados con una antigüedad superior a este valor."
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_TITLE="J2Commerce: Limpiar registros de cola"

; Process Queue routine
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_DESC="Procesa los elementos pendientes en la cola de J2Commerce. Crea registros de ejecución para auditoría."
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_BATCH_SIZE="Tamaño del lote"
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_BATCH_SIZE_DESC="Número máximo de elementos de la cola a procesar por ejecución."
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_QUEUE_TYPE="Tipo de cola"
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_QUEUE_TYPE_DESC="Procesa sólo este tipo de cola. Dejar vacío para procesar todos los tipos."
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_QUEUE_TYPE_HINT="por ejemplo, shipstation, quickbooks"
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_RELEASE_STALE="Liberar Bloqueos Anticuados (Minutos)"
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_RELEASE_STALE_DESC="Libera bloqueos de procesamiento más antiguos que esta cantidad de minutos. Evita que los artículos se bloqueen permanentemente."
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_TITLE="J2Commerce: Cola de procesamiento"

; Remove New Orders routine
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_DESC="Elimina los pedidos incompletos (estado: Nuevo) que tengan una antigüedad superior al número de días especificado. Todos los datos relacionados con el pedido (artículos, atributos, envío, impuestos, etc.) se eliminan en cascada."
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_DRY_RUN="Ejecución en seco"
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_DRY_RUN_DESC="Cuando está activada, la tarea informa de qué pedidos se borrarían sin borrarlos realmente. Desactívela para realizar borrados reales."
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_OLDER_THAN_DAYS="Más antiguo que (días)"
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_OLDER_THAN_DAYS_DESC="Borra los pedidos abandonados con una antigüedad superior a este número de días. Ajuste a 0 para borrar todos los pedidos con estado Nuevo independientemente de su antigüedad."
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_TITLE="J2Commerce: Eliminar pedidos abandonados"

; Update Currency Rates routine
PLG_TASK_J2COMMERCE_UPDATE_CURRENCY_RATES_DESC="Obtiene los últimos tipos de cambio de divisas del proveedor de API configurado y actualiza todas las divisas habilitadas. Configure el proveedor de la API en el plugin de la aplicación J2Commerce Currency Updater."
PLG_TASK_J2COMMERCE_UPDATE_CURRENCY_RATES_TITLE="J2Commerce: Actualizar tipos de cambio de divisas"

; ── Issue #1060 — uploaded-files lifecycle (PR #1059 follow-up) ──
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_DESC="Elimina los archivos de pedidos cargados por el cliente de acuerdo con las reglas de retención."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_CLEANUP_MODE="Modo de limpieza"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_CLEANUP_MODE_DESC="Elija qué conjunto de subidas barrer."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_DELETE_DB_ROWS="Borrar filas de la BD"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_DELETE_DB_ROWS_DESC="Cuando está activada, elimina la fila #__j2commerce_uploads junto con el archivo. Cuando está desactivada, mantiene la fila con status='deleted' para que los administradores conserven una pista de auditoría."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_DRY_RUN="Ejecución en seco"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_DRY_RUN_DESC="Previsualiza los archivos que se eliminarán sin eliminar nada realmente. Conservador por defecto - cambie a No cuando esté listo para actuar."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_RETENTION_DAYS="Días de retención (adjuntos)"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_RETENTION_DAYS_DESC="Conserve los archivos adjuntos del pedido durante al menos este número de días después del último cambio de estado del pedido."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_STATUS_IDS="Estados del pedido"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_STATUS_IDS_DESC="Sólo barrer archivos adjuntos para pedidos en estos estados. Si no se selecciona, no se barren los archivos adjuntos."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_TMP_RETENTION_DAYS="Días de retención (huérfanos)"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_TMP_RETENTION_DAYS_DESC="Las cargas pendientes con una antigüedad superior a este número de días se tratan como huérfanas y se eliminan independientemente de expires_on."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_MODE_ATTACHED="Sólo cargas adjuntas"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_MODE_BOTH="Ambos (huérfanos + adjuntos)"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_MODE_ORPHANED="Sólo cargas tmp huérfanas"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_TITLE="J2Commerce: Limpiar archivos de subida de pedidos"
