PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_DESC="Elimina los archivos de pedidos cargados por el cliente de acuerdo con las reglas de retención. Barre las subidas tmp huérfanas más allá de su caducidad, y/o los archivos adjuntos a pedidos en estados seleccionados más allá de la retención configurada. Se envía con dry_run=1 por defecto - revise el registro, luego desactive dry_run cuando esté satisfecho."
