PLG_TASK_J2COMMERCE="Aufgabe - J2Commerce"
PLG_TASK_J2COMMERCE_XML_DESCRIPTION="Automatisierte Wartungsaufgaben für J2Commerce. Umfasst die Bereinigung von abgebrochenen Bestellungen und andere geplante Routinen."

; Cleanup Queue Logs routine
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_DESC="Löscht alte Warteschlangenausführungsprotokolle und abgeschlossene Warteschlangenposten, um die Datenbank sauber zu halten."
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_DRY_RUN="Trockenlauf"
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_DRY_RUN_DESC="Zeigt in der Vorschau an, was gelöscht werden würde, ohne tatsächlich zu löschen."
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_OLDER_THAN_DAYS="Logs löschen älter als (Tage)"
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_OLDER_THAN_DAYS_DESC="Protokolleinträge, die älter als dieser Wert sind, werden gelöscht."
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_PURGE_COMPLETED="Erledigte Einträge löschen, die älter als (Tage) sind"
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_PURGE_COMPLETED_DESC="Erledigte Einträge in der Warteschlange, die älter als dieser Wert sind, werden gelöscht."
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_TITLE="J2Commerce: Warteschlangenprotokolle bereinigen"

; Process Queue routine
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_DESC="Verarbeitet ausstehende Einträge in der J2Commerce-Warteschlange. Erstellt Ausführungsprotokolle für Audits."
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_BATCH_SIZE="Stapelgröße"
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_BATCH_SIZE_DESC="Maximale Anzahl von Warteschlangenelementen, die pro Ausführung verarbeitet werden."
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_QUEUE_TYPE="Warteschlangen-Typ"
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_QUEUE_TYPE_DESC="Verarbeitet nur diesen Warteschlangentyp. Leer lassen, um alle Typen zu verarbeiten."
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_QUEUE_TYPE_HINT="z.B. shipstation, quickbooks"
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_RELEASE_STALE="Veraltete Sperren freigeben (Minuten)"
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_RELEASE_STALE_DESC="Gibt Verarbeitungssperren frei, die älter als diese Anzahl von Minuten sind. Verhindert, dass Artikel dauerhaft stecken bleiben."
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_TITLE="J2Commerce: Prozess-Warteschlange"

; Remove New Orders routine
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_DESC="Löscht unvollständige Bestellungen (Status: Neu), die älter als die angegebene Anzahl von Tagen sind. Alle zugehörigen Bestelldaten (Artikel, Attribute, Versand, Steuern, usw.) werden kaskadenartig gelöscht."
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_DRY_RUN="Trockenlauf"
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_DRY_RUN_DESC="Wenn aktiviert, meldet die Aufgabe, welche Bestellungen gelöscht werden, ohne sie tatsächlich zu löschen. Deaktivieren Sie, um echte Löschungen durchzuführen."
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_OLDER_THAN_DAYS="Älter als (Tage)"
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_OLDER_THAN_DAYS_DESC="Löscht abgebrochene Bestellungen, die älter als diese Anzahl von Tagen sind. Setzen Sie den Wert auf 0, um alle Bestellungen mit dem Status Neu unabhängig vom Alter zu löschen."
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_TITLE="J2Commerce: Abgebrochene Bestellungen entfernen"

; Update Currency Rates routine
PLG_TASK_J2COMMERCE_UPDATE_CURRENCY_RATES_DESC="Holt sich die neuesten Wechselkurse vom konfigurierten API-Anbieter und aktualisiert alle aktivierten Währungen. Konfigurieren Sie den API-Anbieter im J2Commerce Currency Updater App Plugin."
PLG_TASK_J2COMMERCE_UPDATE_CURRENCY_RATES_TITLE="J2Commerce: Wechselkurse aktualisieren"

; ── Issue #1060 — uploaded-files lifecycle (PR #1059 follow-up) ──
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_DESC="Entfernt vom Kunden hochgeladene Auftragsdateien gemäß den Aufbewahrungsregeln."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_CLEANUP_MODE="Bereinigungsmodus"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_CLEANUP_MODE_DESC="Wählen Sie, welche Uploads durchsucht werden sollen."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_DELETE_DB_ROWS="DB-Zeilen löschen"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_DELETE_DB_ROWS_DESC="Wenn aktiviert, wird die Zeile #__j2commerce_uploads zusammen mit der Datei gelöscht. Wenn deaktiviert, bleibt die Zeile mit status='deleted' erhalten, so dass Admins einen Audit Trail erhalten."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_DRY_RUN="Trockenlauf"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_DRY_RUN_DESC="Zeigt in der Vorschau an, welche Dateien gelöscht werden, ohne dass tatsächlich etwas entfernt wird. Konservative Voreinstellung - schalten Sie auf Nein um, wenn Sie bereit sind zu handeln."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_RETENTION_DAYS="Aufbewahrungstage (angehängt)"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_RETENTION_DAYS_DESC="Bewahren Sie angehängte Auftragsdateien für mindestens so viele Tage nach der letzten Statusänderung des Auftrags auf."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_STATUS_IDS="Bestellstatus"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_STATUS_IDS_DESC="Durchsuchen Sie angehängte Dateien nur für Bestellungen mit diesen Status. Keine Auswahl bedeutet keine Durchsuchung der angehängten Dateien."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_TMP_RETENTION_DAYS="Aufbewahrungstage (verwaist)"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_TMP_RETENTION_DAYS_DESC="Ausstehende Uploads, die älter als diese Anzahl von Tagen sind, werden als verwaist behandelt und unabhängig von expires_on entfernt."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_MODE_ATTACHED="Nur angehängte Uploads"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_MODE_BOTH="Beides (verwaist + angehängt)"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_MODE_ORPHANED="Nur verwaiste tmp-Uploads"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_TITLE="J2Commerce: Bestellungs-Upload-Dateien bereinigen"
