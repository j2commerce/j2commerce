PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_DESC="Entfernt vom Kunden hochgeladene Bestelldateien gemäß den Aufbewahrungsregeln. Durchsucht verwaiste tmp-Uploads nach Ablauf ihrer Gültigkeitsdauer und/oder Dateien, die an Bestellungen in ausgewählten Status angehängt sind, nach Ablauf der konfigurierten Aufbewahrungsfrist. Wird standardmäßig mit dry_run=1 ausgeliefert - überprüfen Sie das Protokoll und deaktivieren Sie dry_run, wenn Sie zufrieden sind."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_TITLE="J2Commerce: Bestellungs-Upload-Dateien bereinigen"
