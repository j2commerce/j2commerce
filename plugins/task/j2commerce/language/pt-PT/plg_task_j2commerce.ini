PLG_TASK_J2COMMERCE="Tarefa - J2Commerce"
PLG_TASK_J2COMMERCE_XML_DESCRIPTION="Tarefas de manutenção automatizadas para o J2Commerce. Inclui a limpeza de encomendas abandonadas e outras rotinas programadas."

; Cleanup Queue Logs routine
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_DESC="Elimina registos de execução de filas antigas e itens de fila concluídos para manter a base de dados limpa."
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_DRY_RUN="Execução a seco"
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_DRY_RUN_DESC="Visualize o que será apagado sem realmente apagar."
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_OLDER_THAN_DAYS="Apagar registos mais antigos que (dias)"
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_OLDER_THAN_DAYS_DESC="Os registos mais antigos que este valor serão apagados."
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_PURGE_COMPLETED="Eliminar itens concluídos com mais de (dias)"
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_PURGE_COMPLETED_DESC="Os itens concluídos da fila com mais de um dia serão eliminados."
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_TITLE="J2Commerce: Limpar Registos de Fila"

; Process Queue routine
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_DESC="Processa itens pendentes na fila do J2Commerce. Cria logs de execução para auditoria."
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_BATCH_SIZE="Tamanho do Lote"
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_BATCH_SIZE_DESC="Número máximo de itens da fila a serem processados por execução."
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_QUEUE_TYPE="Tipo de Fila"
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_QUEUE_TYPE_DESC="Processe apenas este tipo de fila. Deixe em branco para processar todos os tipos."
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_QUEUE_TYPE_HINT="e.g., shipstation, quickbooks"
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_RELEASE_STALE="Liberar bloqueios obsoletos (minutos)"
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_RELEASE_STALE_DESC="Liberte os bloqueios de processamento mais antigos do que este número de minutos. Evita que os itens fiquem permanentemente presos."
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_TITLE="J2Commerce: Fila de Processamento"

; Remove New Orders routine
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_DESC="Exclui pedidos incompletos (status: Novo) que são mais antigos do que o número especificado de dias. Todos os dados relacionados com a encomenda (itens, atributos, envio, impostos, etc.) são eliminados em cascata."
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_DRY_RUN="Execução a seco"
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_DRY_RUN_DESC="Quando activada, a tarefa informa quais as encomendas que seriam eliminadas sem as eliminar realmente. Desative para realizar exclusões reais."
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_OLDER_THAN_DAYS="Mais antigo que (dias)"
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_OLDER_THAN_DAYS_DESC="Exclua os pedidos abandonados com mais de tantos dias. Defina como 0 para eliminar todas as encomendas com o estado Novo, independentemente da idade."
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_TITLE="J2Commerce: Remover Pedidos Abandonados"

; Update Currency Rates routine
PLG_TASK_J2COMMERCE_UPDATE_CURRENCY_RATES_DESC="Obtém as taxas de câmbio mais recentes do provedor de API configurado e atualiza todas as moedas habilitadas. Configure o provedor de API no plugin do aplicativo J2Commerce Currency Updater."
PLG_TASK_J2COMMERCE_UPDATE_CURRENCY_RATES_TITLE="J2Commerce: Atualizar taxas de câmbio"

; ── Issue #1060 — uploaded-files lifecycle (PR #1059 follow-up) ──
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_DESC="Remove os ficheiros de encomenda carregados pelo cliente de acordo com as regras de retenção."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_CLEANUP_MODE="Modo de limpeza"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_CLEANUP_MODE_DESC="Escolha qual o conjunto de uploads a varrer."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_DELETE_DB_ROWS="Eliminar linhas da BD"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_DELETE_DB_ROWS_DESC="Quando ativado, remove a linha #__j2commerce_uploads juntamente com o ficheiro. Quando desativado, mantém a linha com status='deleted' para que os administradores mantenham uma pista de auditoria."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_DRY_RUN="Execução a seco"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_DRY_RUN_DESC="Pré-visualize quais os ficheiros que serão eliminados sem realmente remover nada. Predefinição conservadora - altere para Não quando estiver pronto para agir."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_RETENTION_DAYS="Dias de retenção (em anexo)"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_RETENTION_DAYS_DESC="Mantenha os ficheiros de encomenda anexados durante, pelo menos, este número de dias após a última alteração de estado da encomenda."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_STATUS_IDS="Estados da encomenda"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_STATUS_IDS_DESC="Varra apenas os ficheiros anexados para encomendas nestes estados. Nenhuma seleção significa que não há varrimento de ficheiros anexados."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_TMP_RETENTION_DAYS="Dias de retenção (órfãos)"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_TMP_RETENTION_DAYS_DESC="Os carregamentos pendentes mais antigos do que este número de dias são tratados como órfãos e removidos independentemente de expires_on."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_MODE_ATTACHED="Apenas carregamentos anexados"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_MODE_BOTH="Ambos (órfãos + anexados)"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_MODE_ORPHANED="Apenas carregamentos de tmp órfãos"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_TITLE="J2Commerce: Limpar ficheiros de carregamento de encomendas"
