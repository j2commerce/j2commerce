PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_DESC="Rimuove i file degli ordini caricati dai clienti in base alle regole di conservazione. Elimina i tmp orfani caricati oltre la loro scadenza, e/o i file allegati agli ordini in stati selezionati oltre la conservazione configurata. Viene spedito con dry_run=1 per impostazione predefinita - esamini il registro, quindi disabiliti dry_run quando è soddisfatto."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_TITLE="J2Commerce: Pulisce i file di caricamento degli ordini"
