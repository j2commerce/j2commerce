PLG_TASK_J2COMMERCE="Compito - J2Commerce"
PLG_TASK_J2COMMERCE_XML_DESCRIPTION="Attività di manutenzione automatizzate per J2Commerce. Include la pulizia degli ordini abbandonati e altre routine programmate."

; Cleanup Queue Logs routine
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_DESC="Elimina i vecchi registri di esecuzione della coda e gli elementi della coda completati per mantenere pulito il database."
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_DRY_RUN="Esecuzione a secco"
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_DRY_RUN_DESC="Visualizza l'anteprima di ciò che verrebbe eliminato, senza che l'eliminazione avvenga effettivamente."
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_OLDER_THAN_DAYS="Elimina i registri più vecchi di (giorni)"
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_OLDER_THAN_DAYS_DESC="Le voci di registro più vecchie di questo valore saranno eliminate."
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_PURGE_COMPLETED="Elimina gli elementi completati più vecchi di (giorni)"
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_PURGE_COMPLETED_DESC="Gli elementi della coda completati più vecchi di questo valore verranno eliminati."
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_TITLE="J2Commerce: Pulizia dei registri della coda"

; Process Queue routine
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_DESC="Elabora gli elementi in sospeso nella coda di J2Commerce. Crea dei registri di esecuzione per l'auditing."
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_BATCH_SIZE="Dimensione del lotto"
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_BATCH_SIZE_DESC="Numero massimo di elementi della coda da elaborare per ogni esecuzione."
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_QUEUE_TYPE="Tipo di coda"
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_QUEUE_TYPE_DESC="Elabora solo questo tipo di coda. Lasciare vuoto per elaborare tutti i tipi."
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_QUEUE_TYPE_HINT="ad esempio, shipstation, quickbooks"
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_RELEASE_STALE="Rilascio di blocchi stantii (minuti)"
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_RELEASE_STALE_DESC="Rilascia i blocchi di elaborazione più vecchi di questo numero di minuti. Impedisce che gli articoli rimangano bloccati in modo permanente."
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_TITLE="J2Commerce: Coda di processo"

; Remove New Orders routine
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_DESC="Elimina gli ordini incompleti (stato: Nuovo) che sono più vecchi del numero di giorni specificato. Tutti i dati relativi all'ordine (articoli, attributi, spedizione, tasse, ecc.) vengono eliminati a cascata."
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_DRY_RUN="Esecuzione a secco"
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_DRY_RUN_DESC="Quando è abilitata, l'attività riporta quali ordini verrebbero eliminati senza eliminarli realmente. Disabilita per eseguire le eliminazioni reali."
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_OLDER_THAN_DAYS="Più vecchio di (giorni)"
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_OLDER_THAN_DAYS_DESC="Elimina gli ordini abbandonati più vecchi di questo numero di giorni. Impostare su 0 per eliminare tutti gli ordini con lo stato Nuovo, indipendentemente dall'età."
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_TITLE="J2Commerce: Rimuovere gli ordini abbandonati"

; Update Currency Rates routine
PLG_TASK_J2COMMERCE_UPDATE_CURRENCY_RATES_DESC="Recupera i tassi di cambio più recenti dal fornitore API configurato e aggiorna tutte le valute abilitate. Configuri il fornitore API nel plugin dell'applicazione J2Commerce Currency Updater."
PLG_TASK_J2COMMERCE_UPDATE_CURRENCY_RATES_TITLE="J2Commerce: Aggiornamento dei tassi di cambio valuta"

; ── Issue #1060 — uploaded-files lifecycle (PR #1059 follow-up) ──
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_DESC="Rimuove i file dell'ordine caricati dal cliente in base alle regole di conservazione."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_CLEANUP_MODE="Modalità di pulizia"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_CLEANUP_MODE_DESC="Scegliere quale serie di caricamenti spazzare."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_DELETE_DB_ROWS="Cancellare le righe del DB"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_DELETE_DB_ROWS_DESC="Se abilitato, rimuove la riga #__j2commerce_uploads insieme al file. Quando è disattivato, mantiene la riga con status='deleted', in modo che gli amministratori conservino una traccia di audit."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_DRY_RUN="Esecuzione a secco"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_DRY_RUN_DESC="Visualizza in anteprima i file da eliminare senza rimuovere effettivamente nulla. Predefinito conservativo - passi a No quando è pronto ad agire."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_RETENTION_DAYS="Giorni di conservazione (allegati)"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_RETENTION_DAYS_DESC="Conserva i file dell'ordine allegati per almeno questo numero di giorni dopo l'ultimo cambiamento di stato dell'ordine."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_STATUS_IDS="Stati dell'ordine"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_STATUS_IDS_DESC="Eseguire lo sweep dei file allegati solo per gli ordini in questi stati. Nessuna selezione significa che non si possono controllare i file allegati."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_TMP_RETENTION_DAYS="Giorni di conservazione (orfani)"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_TMP_RETENTION_DAYS_DESC="I caricamenti in sospeso più vecchi di questo numero di giorni vengono trattati come orfani e rimossi indipendentemente da expires_on."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_MODE_ATTACHED="Solo caricamenti allegati"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_MODE_BOTH="Entrambi (orfani + allegati)"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_MODE_ORPHANED="Solo caricamenti tmp orfani"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_TITLE="J2Commerce: Pulisce i file di caricamento degli ordini"
