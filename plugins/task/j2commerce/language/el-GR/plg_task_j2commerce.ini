PLG_TASK_J2COMMERCE="Εργασία - J2Commerce"
PLG_TASK_J2COMMERCE_XML_DESCRIPTION="Αυτοματοποιημένες εργασίες συντήρησης για το J2Commerce. Περιλαμβάνει τον καθαρισμό εγκαταλελειμμένων παραγγελιών και άλλες προγραμματισμένες ρουτίνες."

; Cleanup Queue Logs routine
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_DESC="Διαγράφει τα παλιά αρχεία καταγραφής εκτέλεσης ουράς και τα ολοκληρωμένα στοιχεία ουράς για να διατηρεί τη βάση δεδομένων καθαρή."
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_DRY_RUN="Ξηρή εκτέλεση"
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_DRY_RUN_DESC="Προεπισκόπηση των στοιχείων που θα διαγραφούν χωρίς πραγματική διαγραφή."
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_OLDER_THAN_DAYS="Διαγραφή αρχείων καταγραφής παλαιότερων από (ημέρες)"
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_OLDER_THAN_DAYS_DESC="Οι καταχωρήσεις καταγραφής που είναι παλαιότερες από αυτό το όριο θα διαγραφούν."
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_PURGE_COMPLETED="Εκκαθάριση ολοκληρωμένων στοιχείων παλαιότερων από (ημέρες)"
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_FIELD_PURGE_COMPLETED_DESC="Ολοκληρωμένα στοιχεία ουράς παλαιότερα από αυτό θα διαγραφούν."
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_TITLE="J2Commerce: Καθαρισμός των αρχείων καταγραφής ουράς"

; Process Queue routine
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_DESC="Επεξεργάζεται τα εκκρεμή στοιχεία στην ουρά J2Commerce. Δημιουργεί αρχεία καταγραφής εκτέλεσης για έλεγχο."
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_BATCH_SIZE="Μέγεθος παρτίδας"
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_BATCH_SIZE_DESC="Μέγιστος αριθμός στοιχείων ουράς προς επεξεργασία ανά εκτέλεση."
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_QUEUE_TYPE="Τύπος ουράς"
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_QUEUE_TYPE_DESC="Επεξεργάζεται μόνο αυτόν τον τύπο ουράς. Αφήστε το κενό για να επεξεργαστείτε όλους τους τύπους."
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_QUEUE_TYPE_HINT="π.χ., shipstation, quickbooks"
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_RELEASE_STALE="Απελευθέρωση παλαιών κλειδωμάτων (Λεπτά)"
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_FIELD_RELEASE_STALE_DESC="Απελευθερώνει κλειδαριές επεξεργασίας παλαιότερες από αυτά τα λεπτά. Αποτρέπει το μόνιμο κόλλημα των στοιχείων."
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_TITLE="J2Commerce: Επεξεργασία ουράς"

; Remove New Orders routine
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_DESC="Διαγράφει ημιτελείς παραγγελίες (κατάσταση: Νέα) που είναι παλαιότερες από τον καθορισμένο αριθμό ημερών. Όλα τα σχετικά δεδομένα της παραγγελίας (στοιχεία, χαρακτηριστικά, αποστολή, φόροι κ.λπ.) διαγράφονται κλιμακωτά."
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_DRY_RUN="Ξηρή εκτέλεση"
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_DRY_RUN_DESC="Όταν είναι ενεργοποιημένη, η εργασία αναφέρει ποιες παραγγελίες θα διαγραφούν χωρίς να τις διαγράψει στην πραγματικότητα. Απενεργοποιήστε την επιλογή για να πραγματοποιήσετε πραγματικές διαγραφές."
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_OLDER_THAN_DAYS="Παλαιότερο από (ημέρες)"
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_OLDER_THAN_DAYS_DESC="Διαγραφή εγκαταλελειμμένων παραγγελιών που είναι παλαιότερες από τόσες ημέρες. Ορίστε την τιμή 0 για να διαγράψετε όλες τις παραγγελίες με κατάσταση New ανεξάρτητα από την ηλικία τους."
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_TITLE="J2Commerce: Διαγραφή εγκαταλελειμμένων παραγγελιών"

; Update Currency Rates routine
PLG_TASK_J2COMMERCE_UPDATE_CURRENCY_RATES_DESC="Λαμβάνει τις τελευταίες συναλλαγματικές ισοτιμίες νομισμάτων από τον ρυθμισμένο πάροχο API και ενημερώνει όλα τα ενεργοποιημένα νομίσματα. Διαμορφώστε τον πάροχο API στο πρόσθετο της εφαρμογής J2Commerce Currency Updater app."
PLG_TASK_J2COMMERCE_UPDATE_CURRENCY_RATES_TITLE="J2Commerce: Ενημέρωση ισοτιμιών νομισμάτων"

; ── Issue #1060 — uploaded-files lifecycle (PR #1059 follow-up) ──
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_DESC="Αφαιρεί τα αρχεία παραγγελίας που έχει φορτώσει ο πελάτης σύμφωνα με τους κανόνες διατήρησης."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_CLEANUP_MODE="Λειτουργία καθαρισμού"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_CLEANUP_MODE_DESC="Επιλέξτε ποιο σύνολο μεταφορτώσεων θα σαρώσει."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_DELETE_DB_ROWS="Διαγραφή σειρών DB"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_DELETE_DB_ROWS_DESC="Όταν είναι ενεργοποιημένη, αφαιρεί τη γραμμή #__j2commerce_uploads μαζί με το αρχείο. Όταν είναι απενεργοποιημένη, διατηρεί τη γραμμή με status='deleted', ώστε οι διαχειριστές να διατηρούν ένα ίχνος ελέγχου."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_DRY_RUN="Δοκιμαστική εκτέλεση"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_DRY_RUN_DESC="Προεπισκόπηση των αρχείων που θα διαγραφούν χωρίς να αφαιρεθεί πραγματικά τίποτα. Συντηρητική προεπιλογή - γυρίστε σε Όχι όταν είστε έτοιμοι να δράσετε."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_RETENTION_DAYS="Ημέρες διατήρησης (συνημμένα)"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_RETENTION_DAYS_DESC="Διατηρήστε τα συνημμένα αρχεία της παραγγελίας για τουλάχιστον τόσες ημέρες μετά την τελευταία αλλαγή κατάστασης της παραγγελίας."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_STATUS_IDS="Καταστάσεις παραγγελίας"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_STATUS_IDS_DESC="Σαρώστε τα συνημμένα αρχεία μόνο για παραγγελίες σε αυτές τις καταστάσεις. Καμία επιλογή σημαίνει ότι δεν θα γίνει σάρωση συνημμένων αρχείων."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_TMP_RETENTION_DAYS="Ημέρες διατήρησης (ορφανά)"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_FIELD_TMP_RETENTION_DAYS_DESC="Οι εκκρεμείς μεταφορτώσεις που είναι παλαιότερες από αυτές τις ημέρες αντιμετωπίζονται ως ορφανές και αφαιρούνται ανεξάρτητα από το expires_on."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_MODE_ATTACHED="Μόνο επισυναπτόμενες μεταφορτώσεις"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_MODE_BOTH="Και τα δύο (ορφανά + συνημμένα)"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_MODE_ORPHANED="Μόνο μεταφορτώσεις ορφανών tmp"
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_TITLE="J2Commerce: Καθαρισμός των αρχείων μεταφόρτωσης παραγγελιών"
