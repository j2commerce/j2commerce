PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_DESC="Müşteri tarafından yüklenen sipariş dosyalarını saklama kurallarına göre kaldırır. Son kullanma tarihi geçmiş artık tmp yüklemelerini ve/veya yapılandırılmış saklama süresini geçmiş seçili durumlardaki siparişlere eklenmiş dosyaları süpürür. Varsayılan olarak dry_run=1 ile gönderilir - günlüğü inceleyin, ardından memnun olduğunuzda dry_run'ı devre dışı bırakın."
