PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_DESC="Удаляет загруженные клиентом файлы заказов в соответствии с правилами хранения. Удаляет осиротевшие tmp-загрузки, срок хранения которых истек, и/или файлы, прикрепленные к заказам в выбранных статусах, которые были сохранены дольше установленного срока. По умолчанию поставляется с dry_run=1 - просмотрите журнал, затем отключите dry_run, если Вас все устраивает."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_TITLE="J2Commerce: Очистка файлов загрузки заказов"
