PLG_TASK_J2COMMERCE="وظیفه - J2Commerce"
PLG_TASK_J2COMMERCE_XML_DESCRIPTION="وظایف نگهداری خودکار برای J2Commerce. شامل پاک‌سازی سفارش‌های رها شده و سایر روال‌های زمانبندی شده."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_DESC="فایل‌های سفارش آپلود شده توسط مشتری را طبق قوانین نگهداری حذف می‌کند. آپلودهای موقت یتیم را پس از انقضا و/یا فایل‌های پیوست شده به سفارش‌های با وضعیت‌های انتخاب شده پس از مدت نگهداری پاک‌سازی می‌کند. به طور پیش‌فرض با dry_run=1 ارائه می‌شود — لاگ را بررسی کنید، سپس زمانی که راضی شدید، dry_run را غیرفعال کنید."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_TITLE="J2Commerce: پاک‌سازی فایل‌های آپلود سفارش"
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_DESC="لاگ‌های قدیمی اجرای صف و آیتم‌های تکمیل شده صف را برای تمیز نگه داشتن پایگاه داده حذف می‌کند."
PLG_TASK_J2COMMERCE_CLEANUP_QUEUE_LOGS_TITLE="J2Commerce: پاک‌سازی لاگ‌های صف"
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_DESC="آیتم‌های در انتظار در صف J2Commerce را پردازش می‌کند. لاگ‌های اجرا را برای ممیزی ایجاد می‌کند."
PLG_TASK_J2COMMERCE_PROCESS_QUEUE_TITLE="J2Commerce: پردازش صف"
