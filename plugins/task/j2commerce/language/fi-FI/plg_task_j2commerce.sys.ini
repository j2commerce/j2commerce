PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_DESC="Poistaa asiakkaan lataamat tilaustiedostot säilyttämissääntöjen mukaisesti. Pyyhkäisee orvoksi jääneet tmp-lataustiedostot, jotka ovat vanhentuneet, ja/tai valitun tilan tilauksiin liitetyt tiedostot, jotka ovat ohittaneet määritetyt säilytysajat. Toimitetaan oletusarvoisesti dry_run=1 - tarkista loki ja poista dry_run käytöstä, kun olet tyytyväinen."
