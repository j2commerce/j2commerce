PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_DRY_RUN_DESC="Kun tehtävä on käytössä, se ilmoittaa, mitkä tilaukset poistettaisiin, mutta ei itse asiassa poista niitä. Poista käytöstä todellisten poistojen suorittamiseksi."
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_OLDER_THAN_DAYS="Vanhempi kuin (päivää)"
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_FIELD_OLDER_THAN_DAYS_DESC="Poistaa hylättyjä tilauksia, jotka ovat vanhempia kuin tämä määrä päiviä. Aseta arvoksi 0 poistaaksesi kaikki tilaukset, joiden tila on Uusi, iästä riippumatta."
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_TITLE="J2Commerce: Poista hylätyt tilaukset"

; Update Currency Rates routine
PLG_TASK_J2COMMERCE_UPDATE_CURRENCY_RATES_DESC="Noudattaa viimeisimmät valuuttakurssit määritetystä API-palveluntarjoajasta ja päivittää kaikki käytössä olevat valuutat. Määritä API-palveluntarjoaja J2Commerce Currency Updater -sovelluslaajennuksessa."
PLG_TASK_J2COMMERCE_UPDATE_CURRENCY_RATES_TITLE="J2Commerce: Valuuttakurssien päivittäminen"

