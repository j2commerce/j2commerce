; Remove New Orders routine
PLG_TASK_J2COMMERCE_REMOVE_NEW_ORDERS_DESC="Poistaa keskeneräiset tilaukset (tila: Uusi), jotka ovat vanhempia kuin määritetty määrä päiviä. Kaikki siihen liittyvät tilaustiedot (nimikkeet, attribuutit, toimitus, vero jne.) poistetaan kaskadoittain."
