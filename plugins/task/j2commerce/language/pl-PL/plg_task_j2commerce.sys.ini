PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_DESC="Usuwa pliki zamówień przesłane przez klientów zgodnie z regułami przechowywania. Usuwa osierocone pliki tmp po ich wygaśnięciu i/lub pliki dołączone do zamówień w wybranych statusach po skonfigurowanej retencji. Domyślnie jest dostarczany z dry_run=1 - proszę przejrzeć dziennik, a następnie wyłączyć dry_run, gdy będą Państwo zadowoleni."
