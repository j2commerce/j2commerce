PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_DESC="يزيل ملفات الطلبات التي تم تحميلها من قبل العميل وفقًا لقواعد الاحتفاظ. يمسح ملفات tmp اليتيمة التي تم تحميلها بعد انتهاء صلاحيتها، و/أو الملفات المرفقة بالطلبات في حالات محددة بعد انتهاء فترة الاحتفاظ المكوّنة. يتم الشحن مع dry_run=1 افتراضيًا - راجع السجل، ثم قم بتعطيل dry_run عندما تكون راضيًا."
PLG_TASK_J2COMMERCE_CLEANUP_ORDER_UPLOADS_TITLE="J2Commerce: تنظيف ملفات تحميل الطلبات"
