PLG_SYSTEM_J2COMMERCE="Sistema - J2Commerce"
PLG_SYSTEM_J2COMMERCE_DESCRIPTION="Plugin de sistema que fornece funcionalidade central do J2Commerce, incluindo gerenciamento de sessão de carrinho, inicialização de JavaScript, injeção de classe de versão e tarefas cron de controle de estoque em segundo plano."

; Fieldsets
PLG_SYSTEM_J2COMMERCE_FIELDSET_BASIC="Opções Básicas"
PLG_SYSTEM_J2COMMERCE_FIELDSET_LEAFLETMAP="Mapa Leaflet"
PLG_SYSTEM_J2COMMERCE_FIELDSET_SCHEMA_LABEL="Schema"
PLG_SYSTEM_J2COMMERCE_FIELDSET_SETTINGS_LABEL="Configurações"

; Fields
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_VERSION_CLASS="Ativar Classe de Versão"
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_VERSION_CLASS_DESC="Adiciona a classe de versão do J2Commerce na tag body das páginas de frontend. Isso permite direcionamento CSS específico da versão."

PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CART_CACHE_CLEAR="Clear Cache on Carrinho Atualizar"
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CART_CACHE_CLEAR_DESC="Limpa automaticamente o cache da página quando o carrinho de compras é modificado. Isso garante que os usuários sempre vejam os dados atuais do carrinho."

PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CRON="Ativar Cron de Inventário"
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CRON_DESC="Executa uma tarefa diária de controle de estoque para cancelar pedidos não pagos além do prazo e restaurar o estoque. Isto é executado automaticamente no carregamento da página quando 24 horas se passaram desde a última execução."

; Messages
PLG_SYSTEM_J2COMMERCE_MSG_CRON_EXECUTED="Tarefa cron de controle de inventário executada."
PLG_SYSTEM_J2COMMERCE_MSG_CART_MIGRATED="Carrinho migrado para o usuário logado."
PLG_SYSTEM_J2COMMERCE_MSG_CACHE_CLEARED="Cache de página limpo após atualização do carrinho."

; Basic Fieldset
PLG_SYSTEM_J2COMMERCE_FIELD_DEBUG_MODE_LABEL="Modo de Depuração"
PLG_SYSTEM_J2COMMERCE_FIELD_DEBUG_MODE_DESC="Ative para adicionar comentários HTML mostrando informações de depuração de injeção de schema."
PLG_SYSTEM_J2COMMERCE_FIELD_DEFAULT_BRAND_LABEL="Marca Padrão"
PLG_SYSTEM_J2COMMERCE_FIELD_DEFAULT_BRAND_DESC="Nome da marca padrão para usar quando os produtos não tiverem um fabricante atribuído."

; Offers Fieldset
PLG_SYSTEM_J2COMMERCE_FIELDSET_OFFERS_LABEL="Configurações de Oferta"
PLG_SYSTEM_J2COMMERCE_FIELD_ITEM_CONDITION_LABEL="Condição do Item"
PLG_SYSTEM_J2COMMERCE_FIELD_ITEM_CONDITION_DESC="Condição padrão para todos os produtos. Este valor é usado para conformidade com os Resultados Pesquisados do Google."
PLG_SYSTEM_J2COMMERCE_OPTION_NEW_CONDITION="Novo"
PLG_SYSTEM_J2COMMERCE_OPTION_USED_CONDITION="Usado"
PLG_SYSTEM_J2COMMERCE_OPTION_REFURBISHED_CONDITION="Recondicionado"
PLG_SYSTEM_J2COMMERCE_OPTION_DAMAGED_CONDITION="Com Avaria"

PLG_SYSTEM_J2COMMERCE_FIELD_PRICE_VALID_UNTIL_LABEL="Preço Valid Until"
PLG_SYSTEM_J2COMMERCE_FIELD_PRICE_VALID_UNTIL_DESC="Quanto tempo o preço deve ser válido. Necessário para conformidade com o Google Merchant."
PLG_SYSTEM_J2COMMERCE_OPTION_1_MONTH="1 Mês"
PLG_SYSTEM_J2COMMERCE_OPTION_3_MONTHS="3 Meses"
PLG_SYSTEM_J2COMMERCE_OPTION_6_MONTHS="6 Meses"
