PLG_SYSTEM_J2COMMERCE_OPTION_CUSTOM="Data Personalizada"

PLG_SYSTEM_J2COMMERCE_FIELD_PRICE_VALID_CUSTOM_DATE_LABEL="Data de Validade Personalizada"
PLG_SYSTEM_J2COMMERCE_FIELD_PRICE_VALID_CUSTOM_DATE_DESC="Selecione uma data personalizada para validade do preço. Só é usado quando 'Dados Personalizados' é selecionado acima."

; Leaflet Map Fieldset
PLG_SYSTEM_J2COMMERCE_LEAFLET_SHOW_ORDER_CONFIRM="Exibir Map on Confirmação do Pedido"
PLG_SYSTEM_J2COMMERCE_LEAFLET_MAP_HEIGHT="Altura do Mapa (px)"
PLG_SYSTEM_J2COMMERCE_LEAFLET_MAP_HEIGHT_DESC="Altura em pixels do container do mapa. Padrão: 250."
PLG_SYSTEM_J2COMMERCE_LEAFLET_MAP_ZOOM="Nível de Zoom Padrão"
PLG_SYSTEM_J2COMMERCE_LEAFLET_MAP_ZOOM_DESC="Nível de zoom para o mapa. 1 = mundo, 19 = nível do edifício. Padrão: 15."
PLG_SYSTEM_J2COMMERCE_LEAFLET_TILE_PROVIDER="Provedor de Tiles"
PLG_SYSTEM_J2COMMERCE_LEAFLET_TILE_PROVIDER_DESC="Selecione o provedor de tile do mapa."
PLG_SYSTEM_J2COMMERCE_LEAFLET_NOMINATIM_EMAIL="E-mail de Contato Nominatim"
PLG_SYSTEM_J2COMMERCE_LEAFLET_NOMINATIM_EMAIL_DESC="Endereço de email enviado à API de geocodificação Nominatim de acordo com sua política de uso. Retorna para o email de administrador do J2Commerce se deixado vazio."
