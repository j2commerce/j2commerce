PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_VERSION_CLASS_DESC="کلاس نسخه J2Commerce را به تگ بدنه در صفحات فرانت‌اند J2Commerce اضافه کنید. این امکان هدف‌گیری CSS مخصوص نسخه را فراهم می‌کند."

PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CART_CACHE_CLEAR="پاک کردن حافظه نهان در هنگام به‌روزرسانی سبد خرید"
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CART_CACHE_CLEAR_DESC="هنگام تغییر سبد خرید، حافظه نهان صفحه را به طور خودکار پاک کنید. این اطمینان می‌دهد که کاربران همیشه داده‌های جاری سبد خرید را مشاهده می‌کنند."

PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CRON="فعال‌سازی کرون موجودی"
PLG_SYSTEM_J2COMMERCE_FIELD_ENABLE_CRON_DESC="یک وظیفه روزانه کنترل موجودی را برای لغو سفارش‌های پرداخت نشده پس از انقضای مهلت و بازیابی موجودی اجرا می‌کند. این کار زمانی که ۲۴ ساعت از آخرین اجرا گذشته باشد، به طور خودکار در بارگذاری صفحه اجرا می‌شود."

