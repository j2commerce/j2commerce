COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP0_TITLE="ایجاد محصول جدید"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP0_DESC="برای ایجاد یک محصول جدید، دکمه <strong>جدید</strong> را انتخاب کنید. این کار ویرایشگر مقاله جوملا را همراه با فرم محصول J2Commerce باز می‌کند."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_TITLE="افزودن عنوان محصول"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_DESC="یک عنوان توصیفی برای محصول خود وارد کنید. این عنوان مقاله است و به عنوان نام محصول در فروشگاه شما نمایش داده می‌شود."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP2_TITLE="انتخاب برگه J2Commerce"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP2_DESC="برای دسترسی به تنظیمات اولیه اصلی محصول، برگه <strong>J2Commerce</strong> را انتخاب کنید."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP3_TITLE="استفاده از مقاله به عنوان محصول"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP3_DESC="<p>گزینه 'استفاده به عنوان محصول' را فعال کنید تا مقاله به محصول تبدیل شود.<br>قبل از ادامه، مطمئن شوید که روی <strong>بله</strong> تنظیم شده است.</p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP4_TITLE="انتخاب نوع محصول"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP4_DESC="<p>در این تور، ما یک نوع محصول ساده ایجاد می‌کنیم.<br><strong>ساده</strong> را از منوی کشویی انتخاب کنید.</p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_TITLE="ذخیره فرم برای ادامه"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_DESC="<p>'ذخیره و ادامه' را انتخاب کنید تا تغییر اعمال شود و به اطلاعات محصول دسترسی پیدا کنید.</p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP6_TITLE="انتخاب مجدد برگه J2Commerce"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP6_DESC="برای دسترسی به تنظیمات اصلی محصول مانند قابلیت مشاهده، SKU، تولیدکننده و پروفایل مالیاتی، آیکون برگه <strong>J2Commerce</strong> را انتخاب کنید."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP7_TITLE="تنظیم قابلیت مشاهده محصول"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP7_DESC="این گزینه را روی <strong>بله</strong> تنظیم کنید تا محصول در فروشگاه شما قابل مشاهده باشد. وقتی روی خیر تنظیم شود، محصول وجود دارد اما به مشتریان نشان داده نمی‌شود."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_TITLE="تنظیم SKU محصول"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_DESC="یک SKU منحصر‌به‌فرد برای محصول خود وارد کنید. این یک کد مرجع داخلی است که برای ردیابی موجودی و مدیریت سفارش استفاده می‌شود."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_TITLE="تنظیم پروفایل مالیاتی"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_DESC="پروفایل مالیاتی مناسب را برای این محصول انتخاب کنید. پروفایل‌های مالیاتی تعیین می‌کنند که کدام نرخ‌های مالیاتی بر اساس مکان مشتری اعمال شوند. شما می‌توانید پروفایل‌های مالیاتی را در <strong>J2Commerce &rarr; پروفایل‌های مالیاتی</strong> پیکربندی کنید."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP10_TITLE="انتخاب برگه قیمت‌گذاری"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP10_DESC="برای تنظیم قیمت محصول، برگه <strong>قیمت‌گذاری</strong> را انتخاب کنید. همچنین می‌توانید قوانین قیمت‌گذاری پیشرفته را برای گروه‌های مشتری و بازه‌های تاریخ پیکربندی کنید."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_TITLE="تنظیم قیمت عادی"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_DESC="قیمت فروش عادی محصول خود را وارد کنید. این قیمت پایه است که قبل از اعمال هرگونه تخفیف یا قوانین قیمت‌گذاری ویژه به همه مشتریان نشان داده می‌شود."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP12_TITLE="انتخاب برگه موجودی"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP12_DESC="برای مدیریت سطح موجودی، برگه <strong>موجودی</strong> را انتخاب کنید. می‌توانید مدیریت موجودی را فعال کنید، مقادیر را تنظیم کنید و رفتار پیش‌سفارش را پیکربندی کنید."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP13_TITLE="مدیریت موجودی"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP13_DESC="اگر می‌خواهید J2Commerce سطح موجودی این محصول را ردیابی کند، <strong>مدیریت موجودی</strong> را فعال کنید. هنگامی که فعال باشد، تعداد موجودی با هر سفارش کاهش می‌یابد."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP14_TITLE="انتخاب برگه ارسال"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP14_DESC="برای پیکربندی تنظیمات ارسال برای این محصول، از جمله ابعاد و وزن، برگه <strong>ارسال</strong> را انتخاب کنید."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP15_TITLE="فعال کردن ارسال"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP15_DESC="اگر محصول نیاز به ارسال فیزیکی دارد، این گزینه را روی <strong>بله</strong> تنظیم کنید. محصولات دیجیتال یا قابل دانلود معمولاً نیازی به ارسال ندارند."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP16_TITLE="انتخاب 'ذخیره و بستن'"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP16_DESC="برای ایجاد محصول، <strong>ذخیره و بستن</strong> را انتخاب کنید. محصول به این مقاله پیوست می‌شود و برای فروشگاه شما آماده خواهد بود. همیشه می‌توانید برای ویرایش جزئیات محصول بازگردید."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP17_TITLE="تبریک!"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP17_DESC="<p>شما یک محصول ساده در J2Commerce ایجاد کردید.<br>گزینه‌های بیشتری برای بررسی وجود دارد، مانند افزودن تصاویر به محصول. آن را بررسی کنید!</p>"
