COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP0_TITLE="جستجوی کشورها"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP0_DESC="از کادر جستجو برای یافتن کشورهای خاص استفاده کنید.<br>به عنوان مثال، 'united' را وارد کنید تا 'ایالات متحده'، 'بریتانیا' و غیره را پیدا کنید. سپس 'Enter' را فشار دهید."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP1_TITLE="فعال یا غیرفعال کردن یک کشور"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP1_DESC="وضعیت یک کشور را انتخاب کنید تا آن کشور فعال یا غیرفعال شود."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP2_TITLE="انتخاب چک‌باکس بالا برای انتخاب همه کشورها"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP2_DESC="آن چک‌باکس خاص به شما امکان می‌دهد همه کشورهای صفحه را انتخاب کنید.<br>چک‌باکس را انتخاب شده نگه دارید تا به اقدامات دسته‌جمعی در نوار ابزار دسترسی پیدا کنید."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP3_TITLE="انتخاب دکمه 'اقدامات'"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP3_DESC="دکمه 'اقدامات' به شما امکان می‌دهد به اقدامات دسته‌جمعی برای کشورهای انتخاب شده دسترسی پیدا کنید."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP4_TITLE="انتخاب گزینه 'عدم انتشار'"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP4_DESC="گزینه 'عدم انتشار' به شما امکان می‌دهد همه کشورهای انتخاب شده را یکجا غیرفعال کنید."
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP5_TITLE="تبریک!"
COM_J2COMMERCE_GUIDEDTOUR_MANAGING_COUNTRIES_STEP5_DESC="اکنون می‌توانید کشورهای موجود در فروشگاه خود را مدیریت کنید.<br>غیرفعال کردن یک کشور از خرید مشتریان آن کشور جلوگیری می‌کند،<br>که می‌تواند به دلایل مختلفی مانند محدودیت‌های قانونی یا محدودیت‌های ارسال مفید باشد."
