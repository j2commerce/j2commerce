COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP0_TITLE="Создать новый товар"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP0_DESC="Нажмите кнопку <strong>New</strong>, чтобы создать новый товар. При этом откроется редактор статей Joomla с формой товара J2Commerce."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_TITLE="Введите название товара"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP1_DESC="Введите описательное название для вашего товара. Это название статьи, которое будет отображаться в качестве названия товара в вашем магазине."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP2_TITLE="Выберите вкладку «J2Commerce»"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP2_DESC="Перейдите на вкладку <strong>J2Commerce</strong>, чтобы открыть окно начальной настройки основного продукта."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP3_TITLE="Используйте статью в качестве продукта"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP3_DESC="<p>Включите опцию «Использовать как товар», чтобы преобразовать статью в товар.<br>Перед тем как продолжить, убедитесь, что для параметра установлено значение <strong>Yes</strong>.</p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP4_TITLE="Выберите тип продукта"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP4_DESC="<p>В этом уроке мы создадим простой тип товара.<br>Выберите в раскрывающемся списке <strong>Simple</strong>.</p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_TITLE="Сохраните форму, чтобы продолжить"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP5_DESC="<p> Выберите «Сохранить и продолжить», чтобы применить изменения и перейти к информации о продукте. </p>"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP6_TITLE="Снова выберите вкладку «J2Commerce»"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP6_DESC="Щёлкните значок вкладки <strong>J2Commerce</strong>, чтобы перейти к основным настройкам товара, таким как видимость, SKU, производитель и налоговый профиль."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP7_TITLE="Установить видимость продукта"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP7_DESC="Установите значение <strong>Yes</strong>, чтобы товар отображался в вашем магазине. При значении «No» товар существует, но не будет отображаться покупателям."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_TITLE="Укажите артикул товара (SKU)"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP8_DESC="Введите уникальный SKU для вашего товара. Это внутренний идентификационный код, используемый для учета запасов и управления заказами."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_TITLE="Настройте налоговый профиль"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP9_DESC="Выберите подходящий налоговый профиль для данного товара. Налоговые профили определяют, какие налоговые ставки применяются в зависимости от местонахождения покупателя. Настроить налоговые профили можно в разделе <strong>J2Commerce &rarr; Tax Profiles</strong>."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP10_TITLE="Перейдите на вкладку «Цены»"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP10_DESC="Перейдите на вкладку <strong>Pricing</strong>, чтобы установить цену на товар. Вы также можете настроить расширенные правила ценообразования для групп клиентов и определённых периодов."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_TITLE="Установите обычную цену"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP11_DESC="Укажите стандартную цену вашего товара. Это базовая цена, которая отображается всем покупателям до применения скидок или специальных правил ценообразования."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP12_TITLE="Выберите вкладку «Инвентарь»"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP12_DESC="Перейдите на вкладку <strong>Inventory</strong>, чтобы управлять уровнем запасов. Здесь вы можете включить функцию управления запасами, установить количества и настроить порядок обработки отложенных заказов."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP13_TITLE="Управление запасами"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP13_DESC="Включите функцию <strong>Manage Stock</strong>, если хотите, чтобы J2Commerce отслеживал уровень запасов данного товара. При включении этой функции количество товара будет уменьшаться с каждым заказом."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP14_TITLE="Выберите вкладку «Доставка»"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP14_DESC="Перейдите на вкладку <strong>Shipping</strong>, чтобы настроить параметры доставки для данного товара, включая габариты и вес."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP15_TITLE="Включить доставку"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP15_DESC="Установите значение <strong>Yes</strong>, если товар необходимо отправить по почте. Цифровые или загружаемые товары, как правило, не требуют доставки."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP16_TITLE="Выберите «Сохранить и закрыть»"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP16_DESC="Выберите <strong>Save and Close</strong>, чтобы создать товар. Товар будет прикреплён к этой статье и готов к размещению в вашем магазине. Вы всегда сможете вернуться и отредактировать информацию о товаре."
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP17_TITLE="Поздравляем!"
COM_J2COMMERCE_GUIDEDTOUR_CREATING_PRODUCT_STEP17_DESC="<p> Вы создали простой товар в J2Commerce. <br> Есть и другие возможности, которые стоит изучить, например, добавление изображений к товару. Ознакомьтесь с ними!</p>"
